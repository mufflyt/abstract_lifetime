default:
  # --- Congresses (one entry per year to scrape + analyze) ---
  congresses:
    - year: 2021
      name: "50th AAGL Global Congress"
      date: "2021-11-14"
      volume: 28
      issue: 11
      doi_prefix: "10.1016/j.jmig.2021"
      sciencedirect_url: "https://www.sciencedirect.com/journal/journal-of-minimally-invasive-gynecology/vol/28/issue/11/suppl/S"
      supplement_vol: 28
      supplement_year: 2021
    - year: 2022
      name: "51st AAGL Global Congress"
      date: "2022-11-06"
      volume: 29
      issue: 11
      doi_prefix: "10.1016/j.jmig.2022"
      sciencedirect_url: "https://www.sciencedirect.com/journal/journal-of-minimally-invasive-gynecology/vol/29/issue/11/suppl/S"
      supplement_vol: 29
      supplement_year: 2022
    - year: 2023
      name: "52nd AAGL Global Congress"
      date: "2023-11-07"
      volume: 30
      issue: 11
      doi_prefix: "10.1016/j.jmig.2023"
      sciencedirect_url: "https://www.sciencedirect.com/journal/journal-of-minimally-invasive-gynecology/vol/30/issue/11/suppl/S"
      supplement_vol: 30
      supplement_year: 2023

  # --- Back-compat: legacy scripts that reference cfg$conference still work ---
  conference:
    name: "AAGL 2023 Global Congress"
    date: "2023-11-07"
    journal: "Journal of Minimally Invasive Gynecology"
    journal_abbrev: "J Minim Invasive Gynecol"
    volume: 30
    supplement_pages: "S1-S226"
    doi_prefix: "10.1016/j.jmig.2023"

  sources:
    jmig_supplement_url: "https://www.jmig.org/issue/S1553-4650(23)X0012-8"
    sciencedirect_url: "https://www.sciencedirect.com/journal/journal-of-minimally-invasive-gynecology/vol/30/issue/11/suppl/S"
    pdf_filename: "AAGL_2023_abstracts.pdf"

  # --- PubMed search parameters ---
  pubmed:
    # Date range should cover the earliest congress through the latest follow-up
    # target. Widened to capture AAGL 2021–2023 publications.
    date_start: "2021/11/01"
    date_end: "2026/04/01"
    rate_limit_per_sec: 3
    rate_limit_with_key: 10
    cache_every_n: 10
    max_results_per_query: 20
    # Lists so we can exclude multiple supplement issues simultaneously
    # (one per congress year covered).
    exclude_supplement_vol: [28, 29, 30]
    exclude_supplement_year: [2021, 2022, 2023]

  # --- CrossRef / Europe PMC / OpenAlex ---
  crossref:
    polite_pool: true
    max_results: 5

  europmc:
    max_results: 5

  openalex:
    max_results: 5

  semantic_scholar:
    max_results: 5

  # --- Scoring thresholds ---
  scoring:
    title_jaccard_high: 0.75
    title_jaccard_mid: 0.55
    title_jaccard_low: 0.35
    abstract_semantic_high: 0.70
    abstract_semantic_mid: 0.50
    author_fuzzy_threshold: 0.95
    auto_accept: 7
    manual_review: 3
    auto_reject_below: 3
    pre_conference_penalty: -3
    pub_date_early_months: 18
    pub_date_late_months: 30

  # --- Validation ---
  validation:
    gold_standard_n: 20
    target_sensitivity: 0.80

  # --- Google Sheets (adjudication app backend) ---
  google_sheet_id: "1d2YAsndMxCPK0AQMHw4bgKp3glFg_znGj8Riq5YpfaI"

  # --- Pipeline ---
  pipeline:
    checkpoint_dir: "data/cache/checkpoints"
    output_dir: "output"
    seed: 42
